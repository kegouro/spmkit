      <stop offset="0" stop-color="#141B24"/>
      <stop offset="1" stop-color="#0B0E13"/>
    </linearGradient>
    <linearGradient id="fcurve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="818" height="198" rx="18" fill="url(#fbg)" stroke="#232C38" stroke-width="1.5"/>

  <!-- curva de fuerza decorativa (derecha) -->
  <g font-family="'SF Mono','JetBrains Mono','Menlo',monospace">
    <line x1="500" y1="150" x2="778" y2="150" stroke="#232C38" stroke-width="1" stroke-dasharray="2 5"/>
    <line x1="614" y1="40" x2="614" y2="164" stroke="#232C38" stroke-width="1" stroke-dasharray="2 5"/>
    <path d="M500 132 H612" fill="none" stroke="#4A5765" stroke-width="3" stroke-linecap="round"/>
    <path d="M612 132 q11 17 22 -1" fill="none" stroke="#4A5765" stroke-width="3" stroke-linecap="round"/>
    <path d="M634 131 C 682 128 716 96 778 44" fill="none" stroke="url(#fcurve)" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="612" cy="132" r="5.5" fill="#E8A94B"/>
    <text x="624" y="182" font-size="12.5" fill="#5C6875" letter-spacing="1">δ  →  E,  adhesión,  disipación</text>
