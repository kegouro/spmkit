<svg viewBox="0 0 820 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fathom — curvas de fuerza, a fondo">
  <title>Fathom — curvas de fuerza, a fondo · powered by spmkit</title>
  <defs>
