    <text x="143" y="122" font-size="18" fill="#E8A94B">Curvas de fuerza, a fondo.</text>
    <text x="143" y="148" font-size="12.5" fill="#5C6875" letter-spacing="1.4" font-family="'SF Mono','Menlo',monospace">POWERED BY SPMKIT · REEMPLAZA ANA / JPK</text>
